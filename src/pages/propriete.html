<!DOCTYPE html>

    <script src="../scripts/vendors/CSInterface.js"></script>
    <script src="../scripts/components/collaps.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mdbassit/Coloris@latest/dist/coloris.min.js"></script>
    <script>
      // Charger les polices système via Node.js (disponible en CEP) + cache localStorage
      (function() {
        var CACHE_KEY = 'systemFonts_v1';
        var cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          try { window.systemFonts = JSON.parse(cached); return; } catch(e) {}
        }
        try {
          var cp = require('child_process');
          var cmd = 'powershell -NoProfile -Command "[void][System.Reflection.Assembly]::LoadWithPartialName(\'System.Drawing\'); (New-Object System.Drawing.Text.InstalledFontCollection).Families | ForEach-Object { $_.Name }"';
          var output = cp.execSync(cmd, { encoding: 'utf8', timeout: 10000 });
          var fonts = output.trim().split(/\r?\n/).filter(function(f) { return f.trim().length > 0; }).map(function(f) { return f.trim(); });
          window.systemFonts = fonts;
          localStorage.setItem(CACHE_KEY, JSON.stringify(fonts));
        } catch(e) {
          window.systemFonts = [];
        }
      })();
    </script>
    <script type="module" src="../scripts/pages/propriete.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mdbassit/Coloris@latest/dist/coloris.min.css"/>
