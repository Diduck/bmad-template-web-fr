<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Productivity</title>
		<script src="../scripts/vendors/CSInterface.js"></script>
		<script src="../scripts/components/loading.js"></script>
		<script src="../scripts/components/collaps.js"></script>
		<script type="module" src="../scripts/main.js"></script>
		<link rel="stylesheet" href="../styles/main.css">
		<link rel="stylesheet" href="../styles/pages/montage.css">
		<link rel="stylesheet" href="../styles/components/notification.css">
		<link rel="stylesheet" href="../styles/components/sequence-selector.css">
		<link rel="stylesheet" href="../styles/components/status-bar.css">
	<body>
		<div id="loading-screen">

		</div>
		
		<header>
			<div class="step-nav">
				<a href="./index.html"><div class="step"><p>Création</p></div></a>
				<a href="./smartcut.html"><div class="step"><p>Smart Cut</p></div></a>
				<a href="./montage.html"><div class="step"><p>Montage</p></div></a>
				<a href="./propriete.html"><div class="step"><p>Propriété</p></div></a>
				<a href="#"><div class="step current-step"><p>Exportation</p></div></a>
			</div>
			<div class="header-actions">
				<div class="header-icon-wrapper" id="seqSelectorToggle">
					<button class="header-icon" aria-label="Sélection des séquences"
							aria-expanded="false" aria-controls="seqSelectorPopup">
						<img src="../../assets/icons/sequences.svg" alt="">
					</button>
					<div id="seqSelectorPopup" class="seq-selector-popup" style="display: none;">
					</div>
				</div>
				<a href="./settings.html" class="header-icon" aria-label="Paramètres">
					<img src="../../assets/icons/settings.svg" alt="">
				</a>
			</div>
		</header>

		<section id="main">
			<div class="side side-left">
				<h2>Assemblage - Exportation</h2>
				<p class="desc">(Facultatif)</p>

				<form action="">

					<div class="option">

						<h3>Option</h3>
	
						<div class="option-content">
							<label for="OptionformatPhone"><p>9:16</p>
								<input type="checkbox" name="OptionformatPhone" id="OptionformatPhone" class="checkbox">
								<div class="checkmark"></div>
							</label>
						</div>
	
						<div class="option-content">
							<label for="OptionformatCarre"><p>1:1</p>
								<input type="checkbox" name="OptionformatCarre" id="OptionformatCarre" class="checkbox">
								<div class="checkmark"></div>
							</label>
						</div>

						<div class="option-content">
							<label for="OptionformatHorizontal"><p>16:9</p>
								<input type="checkbox" name="OptionformatHorizontal" id="OptionformatHorizontal" class="checkbox">
								<div class="checkmark"></div>
							</label>
						</div>
	
						
					</div>	
					
					<button type="button" class="button-blue" id="AssemblyButton">Exécuter</button>

				</form>

			</div>

			<div class="side side-right">
			</div>
		</section>

	<div id="statusBar" class="status-bar">
		<span id="statusBarText" class="status-bar__text">1 séquence active</span>
	</div>
	</body>
</html>
